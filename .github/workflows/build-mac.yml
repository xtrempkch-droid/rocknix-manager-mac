name: Build Rocknix Manager macOS

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyinstaller
          # Instala dependências se o arquivo existir
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Convert icon.png to macOS .icns
        run: |
          # O macOS exige um conjunto de ícones em tamanhos diferentes
          mkdir icon.iconset
          sips -z 16 16     icon.png --out icon.iconset/icon_16x16.png
          sips -z 32 32     icon.png --out icon.iconset/icon_16x16@2x.png
          sips -z 32 32     icon.png --out icon.iconset/icon_32x32.png
          sips -z 64 64     icon.png --out icon.iconset/icon_32x32@2x.png
          sips -z 128 128   icon.png --out icon.iconset/icon_128x128.png
          sips -z 256 256   icon.png --out icon.iconset/icon_128x128@2x.png
          sips -z 256 256   icon.png --out icon.iconset/icon_256x256.png
          sips -z 512 512   icon.png --out icon.iconset/icon_256x256@2x.png
          sips -z 512 512   icon.png --out icon.iconset/icon_512x512.png
          cp icon.png       icon.iconset/icon_512x512@2x.png
          
          # Transforma a pasta em um arquivo de ícone do Mac
          iconutil -c icns icon.iconset
          rm -rf icon.iconset

      - name: Build App Bundle
        run: |
          # --windowed: Interface gráfica (sem terminal atrás)
          # --onedir: Cria a estrutura .app correta do macOS
          pyinstaller --windowed --onedir --clean \
            --name "RocknixManager" \
            --icon "icon.icns" \
            rocknix_manager.py

      - name: Zip for Release
        run: |
          cd dist
          zip -r RocknixManager-macOS.zip RocknixManager.app

      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: RocknixManager-Mac
          path: dist/RocknixManager-macOS.zip
