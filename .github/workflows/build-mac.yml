name: Build and Release Rocknix Manager macOS

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*' # O robô vai rodar e criar o release quando você criar uma tag tipo v1.0
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    # PERMISSÃO NECESSÁRIA PARA O ROBÔ PUBLICAR NO RELEASE
    permissions:
      contents: write 

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Generate macOS .icns from icon.png
        run: |
          mkdir icon.iconset
          sips -z 16 16     icon.png --out icon.iconset/icon_16x16.png
          sips -z 32 32     icon.png --out icon.iconset/icon_16x16@2x.png
          sips -z 32 32     icon.png --out icon.iconset/icon_32x32.png
          sips -z 64 64     icon.png --out icon.iconset/icon_32x32@2x.png
          sips -z 128 128   icon.png --out icon.iconset/icon_128x128.png
          sips -z 256 256   icon.png --out icon.iconset/icon_128x128@2x.png
          sips -z 256 256   icon.png --out icon.iconset/icon_256x256.png
          sips -z 512 512   icon.png --out icon.iconset/icon_256x256@2x.png
          sips -z 512 512   icon.png --out icon.iconset/icon_512x512.png
          cp icon.png       icon.iconset/icon_512x512@2x.png
          
          iconutil -c icns icon.iconset
          rm -rf icon.iconset

      - name: Build with PyInstaller
        run: |
          pyinstaller --windowed --onedir --clean \
            --name "RocknixManager" \
            --icon "icon.icns" \
            rocknix_manager.py

      - name: Compress for Distribution
        run: |
          cd dist
          zip -r RocknixManager-macOS.zip RocknixManager.app

      # Isso ainda salva o arquivo na aba Actions (como backup)
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: RocknixManager-Mac-Binary
          path: dist/RocknixManager-macOS.zip

      # ESTE É O PASSO NOVO: Faz o upload direto para a página de Releases
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') # Só publica no Release se você criar uma versão (tag)
        with:
          files: dist/RocknixManager-macOS.zip
