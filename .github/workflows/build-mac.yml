name: Build Rocknix Manager macOS with Icon

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyinstaller
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Create .icns from icon.png
        run: |
          # Cria a estrutura de pastas necessária para o ícone do Mac
          mkdir icon.iconset
          sips -z 16 16     icon.png --out icon.iconset/icon_16x16.png
          sips -z 32 32     icon.png --out icon.iconset/icon_16x16@2x.png
          sips -z 32 32     icon.png --out icon.iconset/icon_32x32.png
          sips -z 64 64     icon.png --out icon.iconset/icon_32x32@2x.png
          sips -z 128 128   icon.png --out icon.iconset/icon_128x128.png
          sips -z 256 256   icon.iconset/icon_128x128.png --out icon.iconset/icon_128x128@2x.png
          sips -z 256 256   icon.png --out icon.iconset/icon_256x256.png
          sips -z 512 512   icon.iconset/icon_256x256.png --out icon.iconset/icon_256x256@2x.png
          sips -z 512 512   icon.png --out icon.iconset/icon_512x512.png
          cp icon.png icon.iconset/icon_512x512@2x.png
          
          # Converte a pasta para o arquivo final .icns
          iconutil -c icns icon.iconset
          rm -rf icon.iconset

      - name: Build with PyInstaller
        run: |
          # --windowed: Interface gráfica sem terminal
          # --icon: Aplica o ícone .icns gerado acima
          # --onedir: Formato padrão recomendado para macOS
          pyinstaller --windowed --onedir --clean \
            --name "RocknixManager" \
            --icon "icon.icns" \
            rocknix_manager.py

      - name: Compress App
        run: |
          cd dist
          zip -r RocknixManager-macOS.zip RocknixManager.app

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: RocknixManager-Mac-Binary
          path: dist/RocknixManager-macOS.zip
